<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Kubíkova Násobilka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1b2a;--card:#1b2d42;--card2:#243347;
  --accent:#ffd60a;--accent2:#ff9f1c;
  --success:#4ade80;--error:#f87171;
  --text:#f0f4f8;--text2:#8fa3b8;--border:rgba(255,255,255,0.1);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* STARS */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) var(--del,0s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.9;transform:scale(1.3)}}

/* LAYOUT */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.25rem 1rem 3rem}
.nav-bar{width:100%;max-width:540px;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem}
.logo{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--accent)}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.45rem 1rem;border-radius:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;transition:all .2s}
.btn-ghost:hover{background:var(--card2);transform:translateY(-1px)}

/* SCREENS */
.screen{display:none;width:100%;max-width:520px;opacity:0;transform:translateY(16px);transition:opacity .35s ease,transform .35s ease}
.screen.active{display:block}
.screen.visible{opacity:1;transform:translateY(0)}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:2rem}

/* SETUP */
.setup-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,2.8rem);color:var(--accent);text-align:center;margin-bottom:.4rem}
.setup-sub{text-align:center;color:var(--text2);font-size:1rem;margin-bottom:1.75rem}
.lbl{font-size:.8rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:.6rem}
.big-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:16px;color:var(--text);font-family:'Fredoka One',cursive;font-size:3rem;text-align:center;padding:.85rem;outline:none;transition:border-color .2s;-moz-appearance:textfield}
.big-input::-webkit-outer-spin-button,.big-input::-webkit-inner-spin-button{-webkit-appearance:none}
.big-input:focus{border-color:var(--accent)}
.presets{display:flex;gap:.5rem;margin-top:.9rem;flex-wrap:wrap;justify-content:center}
.preset-btn{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:.4rem 1.1rem;border-radius:20px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;transition:all .2s}
.preset-btn:hover{background:var(--accent);color:#111;border-color:var(--accent)}
.btn-primary{width:100%;margin-top:1.5rem;background:var(--accent);color:#111;border:none;border-radius:16px;padding:1rem;font-family:'Fredoka One',cursive;font-size:1.35rem;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-primary:hover{transform:translateY(-2px);filter:brightness(1.08)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* QUIZ */
.progress-wrap{margin-bottom:1.25rem}
.progress-info{display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;color:var(--text2);margin-bottom:.4rem}
.progress-bg{background:var(--card);border-radius:100px;height:10px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:100px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.problem-card{background:var(--card);border:2px solid var(--border);border-radius:28px;padding:2.5rem 2rem;text-align:center;margin-bottom:1.25rem;transition:border-color .3s,box-shadow .3s}
.problem-card.correct{border-color:var(--success);box-shadow:0 0 32px rgba(74,222,128,.2)}
.problem-card.wrong{border-color:var(--error);box-shadow:0 0 32px rgba(248,113,113,.2)}
.problem-card.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.problem-number{font-family:'Fredoka One',cursive;font-size:clamp(3rem,13vw,5rem);color:var(--text);letter-spacing:.04em;line-height:1.1}
.problem-number .mult{color:var(--accent)}
.feedback-msg{font-size:1.05rem;font-weight:700;margin-top:.9rem;min-height:1.5rem;color:var(--success)}
.feedback-msg.wrong{color:var(--error)}
.answer-input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:16px;color:var(--text);font-family:'Fredoka One',cursive;font-size:2.5rem;text-align:center;padding:.7rem;outline:none;transition:border-color .2s;-moz-appearance:textfield;margin-bottom:1rem}
.answer-input::-webkit-outer-spin-button,.answer-input::-webkit-inner-spin-button{-webkit-appearance:none}
.answer-input:focus{border-color:var(--accent)}
.answer-input:disabled{opacity:.6}
.retry-badge{display:inline-block;background:rgba(255,159,28,.15);color:var(--accent2);border:1px solid rgba(255,159,28,.35);border-radius:8px;font-size:.72rem;font-weight:800;padding:.1rem .55rem;margin-left:.5rem;vertical-align:middle;font-family:'Nunito',sans-serif;text-transform:uppercase;letter-spacing:.05em}

/* ══════════════════════════════════════
   REWARD ANIMATION – inline scénka
══════════════════════════════════════ */
#reward-stage{
  width:100%;max-width:520px;
  height:0;overflow:hidden;
  border-radius:20px;
  transition:height .3s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  opacity:0;
  margin-bottom:0;
  position:relative;
  background:#0d1b2a;
}
#reward-stage.open{
  height:160px;
  opacity:1;
  margin-bottom:1rem;
}
#reward-stage svg{
  width:100%;height:160px;display:block;
}
/* Každá animace ve scéně je CSS keyframe na SVG elementech přes class */

/* Tramvaj Praha */
@keyframes tramRide   { from{transform:translateX(-240px)} to{transform:translateX(600px)} }
/* Autobus Londýn */
@keyframes busRide    { from{transform:translateX(-280px)} to{transform:translateX(630px)} }
/* Gondola – pluje */
@keyframes gondolaFloat{ 0%{transform:translateY(0)} 50%{transform:translateY(-5px)} 100%{transform:translateY(0)} }
/* Mrak pluje */
@keyframes cloudDrift { from{transform:translateX(-120px)} to{transform:translateX(620px)} }
/* Hvězdy blikají */
@keyframes starPop    { 0%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1.4)} 100%{opacity:.6;transform:scale(1)} }
/* Ptáci letí */
@keyframes birdFly    { from{transform:translateX(-80px) translateY(0)} to{transform:translateX(600px) translateY(-30px)} }
/* Slunce vychází */
@keyframes sunRise    { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
/* Déšť kapky */
@keyframes rainDrop   { from{transform:translateY(-20px);opacity:1} to{transform:translateY(80px);opacity:0} }
/* Vlajka vlaje */
@keyframes flagWave   { 0%,100%{transform:skewX(0deg)} 50%{transform:skewX(-8deg)} }
/* Záblesk/hvězdy kolem věže */
@keyframes sparkle    { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
/* Telefonní budka – světlo bliká */
@keyframes phoneBlink { 0%,100%{opacity:.5} 50%{opacity:1} }
/* Loď na Vltavě */
@keyframes boatSail   { from{transform:translateX(-100px)} to{transform:translateX(620px)} }
/* Balón letí */
@keyframes balloonRise{ from{transform:translateY(100px);opacity:0} to{transform:translateY(-20px);opacity:1} }
/* Tower Bridge se otevírá */
@keyframes bridgeLift { 0%,60%,100%{transform:rotate(0deg)} 30%{transform:rotate(-28deg)} }
/* Kabinková lanovka */
@keyframes cableMove  { from{transform:translateX(-80px)} to{transform:translateX(550px)} }
/* Západ slunce Praha */
@keyframes sunsetGlow { 0%{stop-color:#ff6b35} 50%{stop-color:#ffd60a} 100%{stop-color:#ff6b35} }

.reward-tram   { animation: tramRide    3s linear forwards }
.reward-bus    { animation: busRide     3s linear forwards }
.reward-cloud  { animation: cloudDrift  3s linear forwards }
.reward-bird1  { animation: birdFly     2.2s ease-in forwards }
.reward-bird2  { animation: birdFly     2.6s .3s ease-in forwards }
.reward-sun    { animation: sunRise     1.2s ease-out forwards }
.reward-star1  { animation: starPop     .7s .0s ease-out forwards }
.reward-star2  { animation: starPop     .7s .2s ease-out forwards }
.reward-star3  { animation: starPop     .7s .4s ease-out forwards }
.reward-rain   { animation: rainDrop    .8s linear infinite }
.reward-flag   { animation: flagWave    .5s ease-in-out infinite }
.reward-spark1 { animation: sparkle     .6s .1s ease-out forwards }
.reward-spark2 { animation: sparkle     .6s .3s ease-out forwards }
.reward-spark3 { animation: sparkle     .6s .5s ease-out forwards }
.reward-phone  { animation: phoneBlink  .6s ease-in-out infinite }
.reward-boat   { animation: boatSail    3s ease-in-out forwards }
.reward-balloon{ animation: balloonRise 2.5s ease-out forwards }
.reward-bridge-l { animation: bridgeLift 3s ease-in-out forwards; transform-origin: bottom right }
.reward-bridge-r { animation: bridgeLift 3s ease-in-out forwards; transform-origin: bottom left }
.reward-cable  { animation: cableMove   3s linear forwards }
.reward-gondola{ animation: gondolaFloat 1.5s ease-in-out infinite }

/* RESULTS */
.results-hero{text-align:center;margin-bottom:1.5rem}
.result-emoji{font-size:3.5rem;margin-bottom:.4rem;animation:bounceIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes bounceIn{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.score-big{font-family:'Fredoka One',cursive;font-size:clamp(3rem,11vw,4.5rem);color:var(--accent)}
.score-sub{color:var(--text2);font-size:.95rem;font-weight:700;margin-top:.25rem}
.problems-list{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1.5rem;max-height:380px;overflow-y:auto;padding-right:2px}
.prow{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border-radius:12px;padding:.7rem 1rem;font-weight:700;gap:.5rem}
.prow .expr{font-family:'Fredoka One',cursive;font-size:1.1rem;min-width:80px}
.prow .ans-info{font-size:.82rem;color:var(--text2);flex:1;text-align:center}
.prow .badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;font-weight:900}
.badge-ok{background:rgba(74,222,128,.15);color:var(--success)}
.badge-err{background:rgba(248,113,113,.15);color:var(--error)}

/* DASHBOARD */
.dash-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.dash-title{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--accent)}
.no-history{text-align:center;color:var(--text2);font-style:italic;padding:2rem 0}
.history-list{display:flex;flex-direction:column;gap:.9rem}
.hitem{background:var(--card2);border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.25rem}
.hitem-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.hdate{font-size:.8rem;color:var(--text2)} .hmeta{font-size:.8rem;color:var(--text2)}
.hscore{font-family:'Fredoka One',cursive;font-size:1.6rem}
.hscore.high{color:var(--success)} .hscore.mid{color:var(--accent)} .hscore.low{color:var(--error)}
.wrong-pills{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem}
.wpill{background:rgba(248,113,113,.12);color:var(--error);border:1px solid rgba(248,113,113,.25);border-radius:7px;padding:.15rem .55rem;font-size:.78rem;font-weight:800;font-family:'Fredoka One',cursive}
.all-ok{font-size:.8rem;color:var(--success);margin-top:.4rem}
.fb-badge{font-size:.7rem;padding:.2rem .55rem;border-radius:20px;font-weight:800;display:inline-block;margin-bottom:.8rem}
.fb-badge.online{background:rgba(74,222,128,.15);color:var(--success);border:1px solid rgba(74,222,128,.3)}
.fb-badge.offline{background:rgba(248,113,113,.12);color:var(--error);border:1px solid rgba(248,113,113,.25)}

/* CITY TRANSITION */
#city-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:900;overflow:hidden;transform:translateX(100vw)}
#city-overlay .sky{position:absolute;top:0;left:0;width:100%;height:100%}
#city-overlay .buildings{position:absolute;bottom:0;left:0;width:100%}
#city-overlay .buildings svg{display:block;width:100%;height:auto}
#city-vehicle{position:absolute;bottom:0;left:0}
#city-vehicle svg{display:block}
#city-label{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,8vw,3.5rem);letter-spacing:.05em;color:#ffd60a;text-shadow:0 3px 40px rgba(0,0,0,1),0 0 80px rgba(255,214,10,.5);opacity:0;transition:opacity .4s ease;white-space:nowrap}
@keyframes vehicleRide{from{transform:translateX(-300px)}to{transform:translateX(110vw)}}

/* CONFETTI */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.cpiece{position:absolute;animation:cfall var(--cd,3.5s) var(--cdel,0s) cubic-bezier(.25,.1,.25,1) forwards}
.cpiece.big{animation:cfall-big var(--cd,5s) var(--cdel,0s) cubic-bezier(.2,.6,.4,1) forwards}
.cpiece.burst{animation:cburst var(--cd,2.8s) var(--cdel,0s) ease-out forwards}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(102vh) rotate(480deg);opacity:0}}
@keyframes cfall-big{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}15%{transform:translateY(8vh) translateX(var(--sx,0px)) rotate(60deg) scale(1.1)}85%{opacity:1}100%{transform:translateY(102vh) translateX(var(--ex,0px)) rotate(var(--rot,720deg)) scale(.8);opacity:0}}
@keyframes cburst{0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1}60%{opacity:1}100%{transform:translate(var(--bx,0px),var(--by,120px)) rotate(var(--rot,360deg)) scale(.6);opacity:0}}

@media(max-width:480px){
  .card{padding:1.4rem} .problem-card{padding:2rem 1.25rem} .problems-list{max-height:320px}
  #reward-stage.open{height:130px} #reward-stage svg{height:130px}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- CITY TRANSITION OVERLAY -->
<div id="city-overlay">
  <div class="sky" id="city-sky"></div>
  <div class="buildings" id="city-buildings"></div>
  <div id="city-vehicle"></div>
  <div id="city-label"></div>
</div>

<div class="app">
  <nav class="nav-bar">
    <div class="logo">🚀 Kubíkova Násobilka</div>
    <button class="btn-ghost" onclick="showDashboard()">📊 Historie</button>
  </nav>

  <!-- SETUP -->
  <div class="screen" id="screen-setup">
    <h1 class="setup-title">Ahoj, Kubíku! 👋</h1>
    <p class="setup-sub">Kolik příkladů chceš dnes procvičit?</p>
    <div class="card">
      <label class="lbl" for="count-input">Počet příkladů</label>
      <input class="big-input" type="number" id="count-input" min="1" max="100" value="10" inputmode="numeric">
      <div class="presets">
        <button class="preset-btn" onclick="setCount(5)">5</button>
        <button class="preset-btn" onclick="setCount(10)">10</button>
        <button class="preset-btn" onclick="setCount(15)">15</button>
        <button class="preset-btn" onclick="setCount(20)">20</button>
        <button class="preset-btn" onclick="setCount(25)">25</button>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Jdeme na to! 🚀</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">Příklad 1 z 10</span>
        <span id="prog-pct">0 %</span>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- REWARD STAGE – zobrazí se po správné odpovědi -->
    <div id="reward-stage"></div>

    <div class="problem-card" id="problem-card">
      <div class="problem-number" id="problem-display">3 <span class="mult">×</span> 4</div>
      <div class="feedback-msg" id="feedback"></div>
    </div>
    <input class="answer-input" type="number" id="answer-input" placeholder="?" inputmode="numeric" autocomplete="off">
    <button class="btn-primary" id="submit-btn" onclick="handleSubmit()">Zkontrolovat ✓</button>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div class="results-hero">
      <div class="result-emoji" id="res-emoji">🏆</div>
      <div class="score-big" id="res-score">100 %</div>
      <div class="score-sub" id="res-sub">Výborně!</div>
    </div>
    <div class="card">
      <div class="problems-list" id="problems-list"></div>
      <button class="btn-primary" onclick="resetToSetup()">Zkusit znovu 🔄</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="screen-dashboard">
    <div class="dash-header">
      <button class="btn-ghost" onclick="backFromDash()">← Zpět</button>
      <div class="dash-title">📊 Historie testů</div>
    </div>
    <div class="card">
      <div id="storage-badge"></div>
      <div id="dash-content"></div>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<!-- Firebase: čisté REST API přes fetch() – žádné SDK, funguje všude -->
<script>
const FB_URL = 'https://kubik-nasobilka-default-rtdb.europe-west1.firebasedatabase.app';

window.fbSaveHistory = async function(record) {
  const res = await fetch(FB_URL + '/kubik/history.json', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(record)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
};

window.fbLoadHistory = async function() {
  const res = await fetch(FB_URL + '/kubik/history.json');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data) return null;
  // Seřaď lokálně podle ts sestupně, vezmi posledních 30
  return Object.values(data).sort((a,b) => b.ts - a.ts).slice(0,30);
};
</script>

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let problems=[], idx=0, waitNext=false;
let rewardToggle=0; // 0=Praha, 1=Londýn – střídá se po každé správné odpovědi

// ══════════════════════════════════════════════════════
//  STARS
// ══════════════════════════════════════════════════════
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--del:${Math.random()*6}s`;
    c.appendChild(s);
  }
})();

// ══════════════════════════════════════════════════════
//  REWARD ANIMATIONS – 10 Praha + 10 Londýn
// ══════════════════════════════════════════════════════

// Každá animace = funkce vracející SVG string (statické pozadí + animované elementy přes class)
const REWARDS = {

  prague: [

    // 1) Tramvaj projíždí noční Prahou
    () => `<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0820"/><stop offset="100%" stop-color="#1a1050"/></linearGradient></defs>
      <rect width="520" height="160" fill="url(#sky1)"/>
      <!-- Budovy -->
      <rect x="10"  y="70"  width="30" height="90"  fill="#2d1f6e"/><polygon points="10,70 25,50 40,70"  fill="#3b2880"/>
      <rect x="60"  y="55"  width="45" height="105" fill="#231855"/><polygon points="60,55 82,32 105,55" fill="#4a2fa0"/>
      <rect x="130" y="80"  width="28" height="80"  fill="#2d1f6e"/>
      <rect x="180" y="60"  width="40" height="100" fill="#231855"/><polygon points="180,60 200,38 220,60" fill="#3b2880"/>
      <rect x="240" y="75"  width="32" height="85"  fill="#2a1a60"/>
      <rect x="300" y="65"  width="50" height="95"  fill="#1e1450"/>
      <rect x="370" y="78"  width="35" height="82"  fill="#2d1f6e"/>
      <rect x="430" y="58"  width="44" height="102" fill="#231855"/><polygon points="430,58 452,36 474,58" fill="#4a2fa0"/>
      <!-- Koleje -->
      <rect x="0" y="138" width="520" height="5" fill="#3b2880" rx="2"/>

let pragueIdx  = 0;
let londonIdx  = 0;

function showRewardAnimation() {
  const stage = document.getElementById('reward-stage');
  const city  = (rewardToggle % 2 === 0) ? 'prague' : 'london';
  rewardToggle++;

  // Vyber animaci (cyklicky, ne náhodně – tak se všechny vystřídají)
  let svgFn;
  if (city === 'prague') {
    svgFn = REWARDS.prague[pragueIdx % REWARDS.prague.length];
    pragueIdx++;
  } else {
    svgFn = REWARDS.london[londonIdx % REWARDS.london.length];
    londonIdx++;
  }

  // Reset stage – nejdřív zavři, pak otevři s novým obsahem
  stage.classList.remove('open');
  stage.innerHTML = '';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      stage.innerHTML = svgFn();
      stage.classList.add('open');
      // Automaticky zavři po 3 sekundách
      setTimeout(() => {
        stage.classList.remove('open');
        setTimeout(() => { stage.innerHTML = ''; }, 350);
      }, 3000);
    });
  });
}

function hideRewardAnimation() {
  const stage = document.getElementById('reward-stage');
  stage.classList.remove('open');
  setTimeout(() => { stage.innerHTML = ''; }, 350);
}

// ══════════════════════════════════════════════════════
//  PROBLEM GENERATION
// ══════════════════════════════════════════════════════
function generateProblems(n){
  const all=[];
  for(let a=1;a<=10;a++) for(let b=1;b<=10;b++) all.push({a,b});
  for(let i=all.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]]; }
  return Array.from({length:n},(_,i)=>{
    const {a,b}=all[i%all.length];
    return {a,b,answer:a*b,userAnswer:null,correct:null,isRetry:false};
  });
}

function startQuiz(){
  const n=parseInt(document.getElementById('count-input').value)||0;
  if(n<1||n>100){ alert('Zadej číslo od 1 do 100!'); return; }
  problems=generateProblems(n);
  idx=0; waitNext=false;
  // Reset indexů animací pro nové cvičení
  pragueIdx=0; londonIdx=0; rewardToggle=0;
  show('screen-quiz');
  setTimeout(()=>{ renderProblem(); setTimeout(()=>document.getElementById('answer-input').focus(),80); },3100);
}

// ══════════════════════════════════════════════════════
//  QUIZ LOGIC
// ══════════════════════════════════════════════════════
function renderProblem(){
  hideRewardAnimation();
  const p=problems[idx], total=problems.length;
  const origTotal=problems.filter(p=>!p.isRetry).length;
  const doneCount=problems.slice(0,idx).filter(p=>!p.isRetry).length;
  const pct=Math.round(doneCount/origTotal*100);
  document.getElementById('prog-text').textContent=`Příklad ${idx+1} z ${total}`;
  document.getElementById('prog-pct').textContent=pct+' %';
  document.getElementById('prog-bar').style.width=pct+'%';
  const retryBadge=p.isRetry?'<span class="retry-badge">opakování</span>':'';
  document.getElementById('problem-display').innerHTML=`${p.a} <span class="mult">×</span> ${p.b}${retryBadge}`;
  document.getElementById('problem-card').className='problem-card';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback-msg';
  document.getElementById('answer-input').value='';
  document.getElementById('answer-input').disabled=false;
  document.getElementById('submit-btn').textContent='Zkontrolovat ✓';
  document.getElementById('submit-btn').disabled=false;
  waitNext=false;
}

function handleSubmit(){
  if(waitNext){
    idx++;
    if(idx>=problems.length) finishQuiz();
    else{ renderProblem(); document.getElementById('answer-input').focus(); }
    return;
  }
  const val=document.getElementById('answer-input').value.trim();
  if(val==='') return;
  const ua=parseInt(val);
  if(isNaN(ua)) return;

  const p=problems[idx];
  p.userAnswer=ua; p.correct=(ua===p.answer);
  const card=document.getElementById('problem-card');
  const fb=document.getElementById('feedback');

  if(p.correct){
    card.className='problem-card correct';
    fb.className='feedback-msg';
    const msgs=['✅ Správně! Skvělá práce!','✅ Výborně! Tak dál!','✅ Přesně tak! Bravo!','✅ Perfektní!'];
    fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    showRewardAnimation(); // 🎉 Animace po správné odpovědi
  } else {
    card.className='problem-card wrong';
    card.classList.add('shake');
    setTimeout(()=>card.classList.remove('shake'),400);
    fb.className='feedback-msg wrong';
    fb.textContent=`❌ Špatně. Správná odpověď je ${p.answer}.`;
    scheduleRetry(p,idx);
  }

  document.getElementById('answer-input').disabled=true;
  const isLast=(idx===problems.length-1);
  document.getElementById('submit-btn').textContent=isLast?'Zobrazit výsledky 📊':'Další příklad →';
  waitNext=true;
}

function scheduleRetry(wrongP,currentIdx){
  if(wrongP.isRetry) return;
  const remaining=problems.length-currentIdx-1;
  if(remaining<=0) return;
  const offset=Math.min(2+Math.floor(Math.random()*3),remaining);
  problems.splice(currentIdx+1+offset,0,{a:wrongP.a,b:wrongP.b,answer:wrongP.answer,userAnswer:null,correct:null,isRetry:true});
}

document.getElementById('answer-input').addEventListener('keydown',e=>{ if(e.key==='Enter') handleSubmit(); });
document.getElementById('count-input').addEventListener('keydown',e=>{ if(e.key==='Enter') startQuiz(); });

// ══════════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════════
function finishQuiz(){
  const origProbs=problems.filter(p=>!p.isRetry);
  const correct=origProbs.filter(p=>p.correct).length;
  const pct=Math.round(correct/origProbs.length*100);
  saveHistory(pct,correct,origProbs.length,problems);
  document.getElementById('res-score').textContent=pct+' %';
  let emoji,lbl;
  if(pct===100){emoji='🏆';lbl='Perfektní! Jsi hvězda! 🌟';}
  else if(pct>=80){emoji='⭐';lbl=`Výborně! ${correct} z ${origProbs.length} správně!`;}
  else if(pct>=60){emoji='💪';lbl=`Dobrá práce! ${correct} z ${origProbs.length}. Zkus ještě jednou!`;}
  else{emoji='📚';lbl=`${correct} z ${origProbs.length}. Nevadí, procvič to znovu!`;}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-sub').textContent=lbl;
  document.getElementById('problems-list').innerHTML=origProbs.map(p=>`
    <div class="prow">
      <span class="expr">${p.a} × ${p.b}</span>
      <span class="ans-info">${p.correct?`= ${p.answer}`:`Tvoje: ${p.userAnswer} · Správně: ${p.answer}`}</span>
      <span class="badge ${p.correct?'badge-ok':'badge-err'}">${p.correct?'✓':'✗'}</span>
    </div>`).join('');
  show('screen-results');
  if(pct===100) setTimeout(()=>confetti(),3200);
}

function resetToSetup(){ show('screen-setup'); }

// ══════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════
async function saveHistory(pct,correct,total,allProblems){
  const record={
    date:new Date().toLocaleString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    ts:Date.now(),pct,correct,total,
    wrongs:allProblems.filter(p=>!p.isRetry&&!p.correct).map(p=>`${p.a}×${p.b}`)
  };
  try{
    await window.fbSaveHistory(record);
  } catch(e){ console.error('Firebase save failed:',e); }
}

function showDashboard(){
  show('screen-dashboard');
  const badge=document.getElementById('storage-badge');
  const el=document.getElementById('dash-content');
  badge.innerHTML='<span class="fb-badge online">☁️ Firebase – online</span>';
  el.innerHTML='<p class="no-history">Načítám historii…</p>';
  window.fbLoadHistory()
    .then(items=>{
      if(!items||!items.length){el.innerHTML='<p class="no-history">Zatím žádné testy. Jdeme na to! 🚀</p>';return;}
      renderHistoryList(el, items);
    })
    .catch(e=>{
      badge.innerHTML='<span class="fb-badge offline">⚠️ Chyba připojení k Firebase</span>';
      el.innerHTML='<p class="no-history">Nepodařilo se načíst historii.</p>';
      console.error('Firebase read failed:',e);
    });
}

function renderHistoryList(container,items){
  if(!items||!items.length){container.innerHTML='<p class="no-history">Zatím žádné testy. Jdeme na to! 🚀</p>';return;}
  container.innerHTML=`<div class="history-list">${items.map(item=>{
    const cls=item.pct>=80?'high':item.pct>=60?'mid':'low';
    const wrongs=item.wrongs&&item.wrongs.length
      ?`<div class="wrong-pills">${item.wrongs.map(w=>`<span class="wpill">${w}</span>`).join('')}</div>`
      :`<div class="all-ok">✅ Vše správně!</div>`;
    return `<div class="hitem"><div class="hitem-top"><div><div class="hdate">${item.date||''}</div><div class="hmeta">${item.total} příkladů · ${item.correct} správně</div></div><div class="hscore ${cls}">${item.pct} %</div></div>${wrongs}</div>`;
  }).join('')}</div>`;
}

function backFromDash(){ show('screen-setup'); }

// ══════════════════════════════════════════════════════
//  CONFETTI (jen při 100 %)
// ══════════════════════════════════════════════════════
function confetti(){
  const wrap=document.getElementById('confetti-wrap');
  const cols=['#ffd60a','#4ade80','#60a5fa','#f87171','#c084fc','#fb923c','#ffffff','#38bdf8','#f472b6','#a3e635'];
  for(let i=0;i<160;i++){
    const p=document.createElement('div'); p.className='cpiece big';
    const isStrip=Math.random()>.55;
    const w=isStrip?6+Math.random()*6:14+Math.random()*18;
    const h=isStrip?22+Math.random()*28:w;
    const dur=3.8+Math.random()*2.4; const del=Math.random()*1.2;
    p.style.cssText=`left:${Math.random()*100}%;top:-30px;width:${w}px;height:${h}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${isStrip?'3px':Math.random()>.4?'50%':'4px'};--cd:${dur}s;--cdel:${del}s;--sx:${(Math.random()-.5)*60}px;--ex:${(Math.random()-.5)*120}px;--rot:${360+Math.floor(Math.random()*3)*360}deg`;
    wrap.appendChild(p); setTimeout(()=>p.remove(),(dur+del)*1000+300);
  }
  for(let i=0;i<50;i++){
    const p=document.createElement('div'); p.className='cpiece burst';
    const ang=Math.random()*Math.PI; const dist=160+Math.random()*260;
    const sz=10+Math.random()*20; const dur=2.2+Math.random()*1.6; const del=Math.random()*.5;
    p.style.cssText=`left:calc(50% - ${sz/2}px);top:10vh;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.4?'50%':'4px'};--cd:${dur}s;--cdel:${del}s;--bx:${Math.cos(ang)*dist*(Math.random()>.5?1:-1)}px;--by:${Math.sin(ang)*dist+80}px;--rot:${(Math.random()-.5)*720}deg`;
    wrap.appendChild(p); setTimeout(()=>p.remove(),(dur+del)*1000+300);
  }
}
</script>
